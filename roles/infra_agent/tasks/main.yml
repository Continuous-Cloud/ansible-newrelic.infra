---
- name: Gather System Facts
  ansible.builtin.setup:
    gather_subset:
      - system
  when: ansible_facts['system'] is not defined

- name: Load New Relic Shared Vars
  ansible.builtin.include_vars: "{{ role_path }}/../../vars/{{ _file }}"
  loop:
    - all.yml
    - "{{ ansible_facts['system'] }}.yml"
  loop_control:
    loop_var: _file

- name: Check Mandatory Variables Are Defined
  ansible.builtin.assert:
    that:
      - infra_agent_license_key is defined

- name: Load OS Specific Tasks
  ansible.builtin.include_tasks: "{{ role_path }}/tasks/{{ ansible_facts['system'] }}/main.yml"
